<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inloggen — Rapportage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="/style.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 360px; max-width: 90vw;
      text-align: center;
      box-shadow: 0 8px 32px rgba(15,23,42,0.08);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .login-logo {
      width: 48px; height: 48px; border-radius: 12px;
      background: var(--orange); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700; margin-bottom: 8px;
    }
    .login-title { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; color: var(--text); }
    .login-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 16px; }
    .login-form { display: flex; flex-direction: column; gap: 10px; width: 100%; margin-top: 8px; }
    .login-input {
      width: 100%; padding: 10px 14px;
      border: 1px solid var(--border); border-radius: 8px;
      font-size: 14px; font-family: var(--font);
      outline: none; color: var(--text); background: var(--surface);
    }
    .login-input:focus { border-color: var(--orange); }
    .login-btn {
      background: var(--orange); color: #fff;
      border: none; border-radius: 8px;
      padding: 10px; font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: var(--font); margin-top: 4px;
    }
    .login-btn:hover { background: var(--orange-dark); }
    .login-btn:disabled { background: var(--text-light); cursor: default; }
    .login-error { font-size: 13px; color: #b91c1c; margin-top: 4px; min-height: 20px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">R</div>
    <h1 class="login-title">Rapportage</h1>
    <p class="login-sub">Inloggen met je Woeler-account</p>
    <form class="login-form" onsubmit="doLogin(event)">
      <input type="email" id="email" class="login-input" placeholder="E-mailadres" required autocomplete="email" />
      <input type="password" id="password" class="login-input" placeholder="Wachtwoord" required autocomplete="current-password" />
      <button type="submit" class="login-btn" id="login-btn">Inloggen</button>
    </form>
    <p class="login-error" id="login-error"></p>
  </div>
  <script>
    async function doLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const err = document.getElementById('login-error');
      err.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Bezig…';
      try {
        const r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
          }),
        });
        const data = await r.json();
        if (data.ok) {
          window.location.href = '/';
        } else {
          err.textContent = data.error || 'Inloggen mislukt.';
          btn.disabled = false;
          btn.textContent = 'Inloggen';
        }
      } catch {
        err.textContent = 'Verbindingsfout. Probeer opnieuw.';
        btn.disabled = false;
        btn.textContent = 'Inloggen';
      }
    }
  </script>
</body>
</html>
