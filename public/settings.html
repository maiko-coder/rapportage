<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instellingen — Rapportage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body style="background:var(--bg)">

<header class="site-header">
  <div class="header-brand">
    <div class="brand-logo">R</div>
    <span class="brand-title">Rapportage</span>
    <span class="brand-sep">·</span>
    <span class="brand-client">Instellingen</span>
  </div>
  <div style="display:flex;align-items:center;gap:16px">
    <a href="/" class="back-link">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 2L4 7l5 5"/>
      </svg>
      Terug naar dashboard
    </a>
  </div>
</header>

<div style="margin-top:var(--header-h)">
  <div class="settings-wrap">
    <div class="settings-header">
      <div>
        <h1>Instellingen</h1>
        <p>Beheer klantlinks, wachtwoorden, zichtbare rapporten en account-koppelingen.</p>
      </div>
    </div>

    <div id="settings-list">
      <div style="padding:48px;text-align:center;color:var(--text-muted)">Laden…</div>
    </div>
  </div>

  <div class="settings-save-bar">
    <span class="settings-save-status" id="save-status"></span>
    <button class="btn-primary-lg" onclick="saveAll()">Opslaan</button>
  </div>
</div>

<script src="/clients.js"></script>
<script src="/settings.js"></script>
</body>
</html>
